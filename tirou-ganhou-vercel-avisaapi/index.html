<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIROU GANHOU DA PONTO AMIGO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="pagina">
    <section class="hero">
      <div class="logo-wrap">
        <img src="logo-ponto-amigo.png" alt="Ponto Amigo" class="logo" />
      </div>

      <div class="titulo-area">
        <p class="tag">Ponto Amigo</p>
        <h1>TIROU GANHOU</h1>
        <p class="instrucao">Digite seu código, escolha uma carta e descubra seu prêmio.</p>
      </div>
    </section>

    <section class="painel-login" id="painelLogin">
      <h2>Entrar no jogo</h2>
      <p>Use o código que você recebeu para participar.</p>

      <form id="formCodigo" class="form-codigo">
        <input
          type="text"
          id="codigoUsuario"
          placeholder="Exemplo: PA-001"
          autocomplete="off"
          required
        />
        <button type="submit" id="btnEntrar">Entrar</button>
      </form>

      <div class="erro" id="erroLogin"></div>
    </section>

    <section class="painel-jogo escondido" id="painelJogo">
      <div class="usuario-barra">
        <div>
          <span>Participante</span>
          <strong id="nomeParticipante">-</strong>
        </div>
        <button type="button" class="btn-secundario" id="btnTrocarUsuario">Trocar usuário</button>
      </div>

      <p class="instrucao jogo">Escolha apenas uma carta. Depois disso, sua participação fica bloqueada.</p>

      <div class="tabuleiro" id="tabuleiro"></div>

      <div class="mensagem" id="mensagem"></div>
    </section>
  </main>

  <div class="carregando escondido" id="carregando">
    <div class="spinner"></div>
    <p>Registrando...</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
